name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔎 Get last tag
        id: last_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 🔎 Get commits since last tag
        id: commits
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"

          if [ -z "$LAST_TAG" ]; then
            echo "No tags found, using full history"
            COMMITS=$(git log --pretty=%B)
          else
            echo "Last tag: $LAST_TAG"
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=%B)
          fi

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🔢 Compute next version
        id: bump
        run: |
          TAG="${{ steps.last_tag.outputs.tag }}"
          COMMITS="${{ steps.commits.outputs.commits }}"

          if [ -z "$TAG" ]; then
            TAG="v0.0.0"
          fi

          echo "Current tag: $TAG"

          MAJOR=$(echo $TAG | cut -d. -f1 | tr -d v)
          MINOR=$(echo $TAG | cut -d. -f2)
          PATCH=$(echo $TAG | cut -d. -f3)

          # 🔥 priorité : breaking change
          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            MAJOR=$((MAJOR+1))
            MINOR=0
            PATCH=0

          elif echo "$COMMITS" | grep -q "^feat"; then
            MINOR=$((MINOR+1))
            PATCH=0

          elif echo "$COMMITS" | grep -q "^fix"; then
            PATCH=$((PATCH+1))

          else
            echo "No version bump needed"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New tag: $NEW_TAG"

      - name: 🏷️ Create tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

      - name: ℹ️ No version change
        if: steps.bump.outputs.skip == 'true'
        run: echo "No new version created"