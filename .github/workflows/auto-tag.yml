name: Auto Tag

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          git log "$RANGE" --pretty=%s > commit_subjects.txt

          if [ ! -s commit_subjects.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TAG="$LAST_TAG"
          MAJOR=$(echo "$CURRENT_TAG" | cut -d. -f1 | tr -d v)
          MINOR=$(echo "$CURRENT_TAG" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_TAG" | cut -d. -f3)

          if grep -qE '^[a-z]+(\([^)]+\))?!:' commit_subjects.txt; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif grep -qE '^feat(\([^)]+\))?:' commit_subjects.txt; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif grep -qE '^fix(\([^)]+\))?:' commit_subjects.txt; then
            PATCH=$((PATCH + 1))
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag ${NEW_TAG} already exists locally"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --tags --refs origin "refs/tags/${NEW_TAG}" | grep -q .; then
            echo "Tag ${NEW_TAG} already exists on origin"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Computed ${NEW_TAG} from ${LAST_TAG}"

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: No version change
        if: steps.version.outputs.skip == 'true'
        run: echo "No semantic version bump required"
